<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Thank You — Cloud Canary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Lora:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<style>
:root {
  --white:    #ffffff;
  --off:      #f7f9fc;
  --sky:      #edf3ff;
  --canary:   #fde72e;
  --blue:     #1a56db;
  --ink:      #0d1b2e;
  --body:     #3a4f6e;
  --border:   rgba(26,86,219,.1);
  --r3:       32px;
  --pill:     100px;
  --s3:       0 20px 60px rgba(13,27,46,.14);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Bricolage Grotesque',sans-serif;background:linear-gradient(165deg,#f0f6ff 0%,white 100%);color:var(--ink);min-height:100svh;display:flex;align-items:center;justify-content:center;overflow-x:hidden;line-height:1.6;padding:2rem clamp(1.25rem,4.5vw,3.5rem)}

.thankyou-card {
  background: white;
  border-radius: var(--r3);
  padding: 4rem 3rem;
  box-shadow: var(--s3);
  border: 1.5px solid var(--border);
  text-align: center;
  max-width: 600px;
  width: 100%;
  position: relative;
  overflow: hidden;
}
.thankyou-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--canary) 0%,var(--blue) 60%,#818cf8 100%)}

.eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);margin-bottom:1.5rem}
.eyebrow::before, .eyebrow::after{content:'';width:15px;height:2.5px;border-radius:2px;background:var(--canary);flex-shrink:0}

.h1{font-size:clamp(2.5rem,5vw,3.5rem);font-weight:800;line-height:1.06;letter-spacing:-.03em;color:var(--ink);margin-bottom:1.2rem}
.h1 i{font-family:'Lora',serif;font-style:italic;font-weight:400;color:var(--blue);font-size:1.02em}

.body-copy{font-size:1.05rem;color:var(--body);line-height:1.82;margin:0 auto 2.5rem;max-width:480px}

.btn{display:inline-flex;align-items:center;gap:8px;font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:15px;letter-spacing:-.01em;border-radius:var(--pill);padding:14px 32px;text-decoration:none;border:none;cursor:pointer;transition:transform .18s,box-shadow .18s;white-space:nowrap}
.btn-ink{background:var(--ink);color:#fff;box-shadow:0 4px 16px rgba(13,27,46,.22)}
.btn-ink:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(13,27,46,.32)}
</style>
</head>
<body>

  <div class="thankyou-card">
    <div class="eyebrow">Submission Received</div>
    <h1 class="h1">Thank <i>You!</i></h1>
    <p class="body-copy">Your details have been securely transmitted. One of our AWS cloud experts will analyze your request and get back to you within one business day to schedule your free assessment.</p>
    <a href="index.html" class="btn btn-ink">&#9729;&#65039; Return to Homepage</a>
  </div>

</body>
</html>
